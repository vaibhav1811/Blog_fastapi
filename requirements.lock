# To generate a proper lockfile with transitive deps and hashes (recommended):
# 1) Using pip-tools:
#    pip install pip-tools
#    pip-compile --output-file=requirements.lock requirements.in
#    pip-sync requirements.lock
# 2) Using Poetry (if you adopt Poetry):
#    poetry install
#    poetry lock
#    poetry export -f requirements.txt --output=requirements.lock --without-hashes
# 3) Or on an existing venv, pin exact installed packages:
#    pip freeze > requirements.lock
